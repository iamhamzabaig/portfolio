<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets content extend under the notch/home indicator so
         the safe-area-inset env() vars become meaningful. Pinch-zoom stays
         enabled (no user-scalable=no) for accessibility. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Installed-app chrome. theme-color tints the status bar and tracks the
         active theme (matches the no-flash script below). Apple standalone tags
         make an added-to-home-screen launch run fullscreen. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hamza" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <script>
      // Set theme before first paint: a stored choice wins, otherwise default to
      // light (white). System preference is intentionally ignored so first-time
      // visitors always land on the light theme.
      (function () {
        try {
          var theme = localStorage.getItem('theme') || 'light';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    <meta
      name="description"
      content="Hamza Munawar — Full-Stack JavaScript Engineer building scalable ERP modules, real-time apps, and high-performance frontends in Angular, React, and Node."
    />

    <!-- Open Graph / social share. Paths are root-relative so they resolve on any
         host; for maximum scraper compatibility (X, LinkedIn), set og:url and the
         image URLs to your absolute production domain once it's known. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hamza Munawar" />
    <meta property="og:title" content="Hamza Munawar — Full-Stack JavaScript Engineer" />
    <meta
      property="og:description"
      content="I build software that scales — enterprise ERP, real-time apps, and high-performance frontends in Angular, React, and Node."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Hamza Munawar — I build software that scales." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hamza Munawar — Full-Stack JavaScript Engineer" />
    <meta
      name="twitter:description"
      content="I build software that scales — enterprise ERP, real-time apps, and high-performance frontends in Angular, React, and Node."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Inter Variable is self-hosted via @fontsource-variable/inter (imported in
         main.jsx) — no external font CDN needed. -->
    <title>Hamza Munawar — Full-Stack JavaScript Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
